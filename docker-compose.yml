version: '3.8'

services:
  backend:
    image: selflearned-backend:latest
    container_name: selflearned-backend
    build:
      context: /DATA/AppData/selflearned/backend
      dockerfile: Dockerfile
    ports:
      - "8082:8000" # Redirection du port libre 8082 de l'hôte vers le port 8000 du conteneur
    volumes:
      - /DATA/AppData/selflearned/data:/SelfLearned_Data # Volume persistant pour tes cours et settings.json
    environment:
      - DATA_DIR=/SelfLearned_Data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway" # Requis pour connecter ton Ollama local si besoin

  frontend:
    image: selflearned-frontend:latest
    container_name: selflearned-frontend
    build:
      context: /DATA/AppData/selflearned/frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80" # Ton interface web accessible sur http://192.168.129.93:8081
    depends_on:
      - backend
    restart: unless-stopped
